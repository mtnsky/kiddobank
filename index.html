const nxtDate = (freq, day) => {
  const now = new Date();
  if (freq === "Weekly") {
    const target = day ?? now.getDay();
    const diff = (target - now.getDay() + 7) % 7 || 7;
    const d = new Date(now); d.setDate(d.getDate() + diff);
    return d.toISOString();
  } else {
    const target = day ?? now.getDate();
    let d = new Date(now.getFullYear(), now.getMonth(), target);
    if (d <= now) d = new Date(now.getFullYear(), now.getMonth() + 1, target);
    const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    if (target > lastDay) d.setDate(lastDay);
    return d.toISOString();
  }
};

/* ── Image Cropper (canvas-rendered, refs for drag state) ── */
function ImageCropper({ src, onCrop, onCancel }) {
const cvRef = useRef(null);
const outRef = useRef(null);
const imgRef = useRef(null);
const S = useRef({ ox: 0, oy: 0, z: 1, drag: false, sx: 0, sy: 0, sox: 0, soy: 0, iw: 1, ih: 1, minZ: 1 });
const [ready, setReady] = useState(false);
const [zVal, setZVal] = useState(1);
const DIM = Math.min(280, typeof window !== “undefined” ? window.innerWidth - 64 : 280);

const paint = useCallback(() => {
const cv = cvRef.current; if (!cv || !imgRef.current) return;
const ctx = cv.getContext(“2d”); const s = S.current;
ctx.clearRect(0, 0, DIM, DIM);
ctx.drawImage(imgRef.current, s.ox, s.oy, s.iw * s.z, s.ih * s.z);
ctx.save(); ctx.fillStyle = “rgba(0,0,0,0.5)”;
ctx.beginPath(); ctx.rect(0, 0, DIM, DIM); ctx.arc(DIM / 2, DIM / 2, DIM / 2, 0, Math.PI * 2, true); ctx.fill(); ctx.restore();
ctx.beginPath(); ctx.arc(DIM / 2, DIM / 2, DIM / 2 - 1, 0, Math.PI * 2);
ctx.strokeStyle = “rgba(255,255,255,0.45)”; ctx.lineWidth = 2; ctx.stroke();
}, [DIM]);

useEffect(() => {
const img = new Image();
img.onload = () => {
imgRef.current = img; const s = S.current;
s.iw = img.naturalWidth; s.ih = img.naturalHeight;
s.minZ = DIM / Math.min(s.iw, s.ih); s.z = s.minZ;
s.ox = (DIM - s.iw * s.z) / 2; s.oy = (DIM - s.ih * s.z) / 2;
setZVal(s.z); setReady(true); paint();
};
img.src = src;
}, [src, DIM, paint]);

const xy = (e) => {
const r = cvRef.current?.getBoundingClientRect(); if (!r) return [0, 0];
const t = e.changedTouches ? e.changedTouches[0] : e;
return [t.clientX - r.left, t.clientY - r.top];
};

const down = (e) => { e.preventDefault(); const [x, y] = xy(e); const s = S.current; s.drag = true; s.sx = x; s.sy = y; s.sox = s.ox; s.soy = s.oy; };
const move = (e) => { e.preventDefault(); const s = S.current; if (!s.drag) return; const [x, y] = xy(e); s.ox = s.sox + (x - s.sx); s.oy = s.soy + (y - s.sy); paint(); };
const up = (e) => { if (e) e.preventDefault(); S.current.drag = false; };

const onZoom = (e) => {
const nz = parseFloat(e.target.value); const s = S.current; const cx = DIM / 2;
const rx = (cx - s.ox) / s.z; const ry = (cx - s.oy) / s.z;
s.z = nz; s.ox = cx - rx * nz; s.oy = cx - ry * nz;
setZVal(nz); paint();
};

const crop = () => {
const cv = outRef.current; if (!cv || !imgRef.current) return;
const O = 400; cv.width = O; cv.height = O;
const ctx = cv.getContext(“2d”);
ctx.beginPath(); ctx.arc(O / 2, O / 2, O / 2, 0, Math.PI * 2); ctx.clip();
const s = S.current; const k = O / DIM;
ctx.drawImage(imgRef.current, s.ox * k, s.oy * k, s.iw * s.z * k, s.ih * s.z * k);
onCrop(cv.toDataURL(“image/jpeg”, 0.9));
};

return (
<div style={{ position: “fixed”, inset: 0, zIndex: 300, display: “flex”, alignItems: “center”, justifyContent: “center”, flexDirection: “column”, background: “rgba(0,0,0,0.88)” }}>
<p style={{ color: “#fff”, fontSize: 18, fontWeight: 700, margin: “0 0 18px” }}>Move and Scale</p>
<canvas ref={cvRef} width={DIM} height={DIM}
style={{ touchAction: “none”, cursor: “grab”, borderRadius: 4 }}
onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
onTouchStart={down} onTouchMove={move} onTouchEnd={up}
/>
{ready && (
<div style={{ display: “flex”, alignItems: “center”, gap: 14, width: DIM, marginTop: 22 }}>
<span style={{ color: “rgba(255,255,255,0.4)”, fontSize: 20, fontWeight: 700, lineHeight: 1 }}>−</span>
<input type=“range” min={S.current.minZ} max={S.current.minZ * 4} step={0.002} value={zVal} onChange={onZoom}
style={{ flex: 1, accentColor: “#007AFF” }} />
<span style={{ color: “rgba(255,255,255,0.4)”, fontSize: 20, fontWeight: 700, lineHeight: 1 }}>+</span>
</div>
)}
<div style={{ display: “flex”, gap: 14, marginTop: 24 }}>
<Btn onClick={onCancel} variant=“outline” color=“rgba(255,255,255,0.5)” style={{ color: “#fff”, borderColor: “rgba(255,255,255,0.25)” }}>Cancel</Btn>
<Btn onClick={crop} color="#007AFF">Choose</Btn>
</div>
<canvas ref={outRef} style={{ display: “none” }} />
</div>
);
}

function DollarSplitInput({ cents, amountCents, onChange, color }) {
const inputRef = useRef(null);
const focused = useRef(false);
const [raw, setRaw] = useState(cents);
useEffect(() => { if (!focused.current) setRaw(cents); }, [cents]);
const display = `$${(raw / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const commit = (n) => { setRaw(n); onChange(n); };
const handleKey = (e) => {
if (e.key === “Backspace” || e.key === “Delete”) { e.preventDefault(); commit(Math.floor(raw / 10)); }
else if (e.key >= “0” && e.key <= “9”) { e.preventDefault(); const n = raw * 10 + parseInt(e.key); if (n <= (amountCents || 9999999) * 2) commit(n); }
};
const handleInput = (e) => {
const d = e.nativeEvent?.data;
if (e.nativeEvent?.inputType === “deleteContentBackward”) commit(Math.floor(raw / 10));
else if (d >= “0” && d <= “9”) { const n = raw * 10 + parseInt(d); if (n <= (amountCents || 9999999) * 2) commit(n); }
};
return (
<div style={{ position: “relative”, width: 80 }} onClick={() => inputRef.current?.focus()}>
<div style={{ …G.inp, padding: “8px 8px”, textAlign: “right”, fontSize: 16, cursor: “text”, borderColor: “rgba(120,120,128,0.2)” }}>
<span style={{ fontWeight: 600, color: raw > 0 ? “var(–text)” : “var(–sub3)”, fontSize: 15 }}>{display}</span>
</div>
<input ref={inputRef} type=“tel” inputMode=“numeric” value=”” onChange={() => {}} onInput={handleInput} onKeyDown={handleKey}
style={{ position: “absolute”, inset: 0, opacity: 0, fontSize: 16 }}
onFocus={e => { focused.current = true; e.target.parentElement.querySelector(“div”).style.borderColor = `${color.primary}66`; e.target.parentElement.querySelector(“div”).style.boxShadow = `0 0 0 3px ${color.primary}15`; }}
onBlur={e => { focused.current = false; e.target.parentElement.querySelector(“div”).style.borderColor = “rgba(120,120,128,0.15)”; e.target.parentElement.querySelector(“div”).style.boxShadow = “none”; }}
/>
</div>
);
}

function KiddoBank() {
const [data, setData] = useState({ children: [] });
const [loaded, setLoaded] = useState(false);
const [active, setActive] = useState(null);
const [dark, setDark] = useState(false);
const [wsName, setWsName] = useState(””);
const [wsColor, setWsColor] = useState(COLORS[0].name);
const [wsPhoto, setWsPhoto] = useState(null);
const [wsRawPhoto, setWsRawPhoto] = useState(null);
const [wsShowCropper, setWsShowCropper] = useState(false);
const [wsOpen, setWsOpen] = useState(false);
const [wsChores, setWsChores] = useState(true);
const wsFileRef = useRef();

useEffect(() => { load().then(d => { setData(d); setDark(!!d.dark); setLoaded(true); }); }, []);
useEffect(() => { if (loaded) save(data); }, [data, loaded]);
const toggleDark = () => { const nd = !dark; setDark(nd); setData(p => ({ …p, dark: nd })); };

const exportData = () => {
const json = JSON.stringify(data, null, 2);
const blob = new Blob([json], { type: “application/json” });
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url;
a.download = `kiddobank-backup-${new Date().toISOString().slice(0, 10)}.json`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
};

const importData = (parsed) => {
setData(parsed);
setDark(!!parsed.dark);
setActive(null);
};

if (!loaded) return (
<div style={{ minHeight: “100vh”, display: “flex”, alignItems: “center”, justifyContent: “center”, background: “#f5f5fa”, fontFamily: FONT }}>
<style>{LG_CSS}{`@keyframes spin{to{transform:rotate(360deg)}} :root { ${THEME_VARS_LIGHT} }`}</style>
<div style={{ …G.glass, borderRadius: 28, padding: “32px 40px”, textAlign: “center” }}>
<Coins size={36} color=”#007AFF” style={{ animation: “spin 1.5s linear infinite”, marginBottom: 12 }} />
<div style={{ fontSize: 15, fontWeight: 600, color: “var(–sub)” }}>Loading…</div>
</div>
</div>
);

const sel = data.children.find(c => c.id === active) || data.children[0] || null;
const del = (cid) => { setData(p => ({ …p, children: p.children.filter(c => c.id !== cid) })); setActive(null); };
const addChild = (ch) => { setData(p => ({ …p, children: […p.children, ch] })); setActive(ch.id); };

// No children: show empty state with add child modal
if (!sel) {
const wsHandleFile = (e) => { const f = e.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { setWsRawPhoto(ev.target.result); setWsShowCropper(true); }; r.readAsDataURL(f); e.target.value = “”; };
return (
<div style={{ minHeight: “100vh”, background: “var(–bg)”, fontFamily: FONT }}>
<style>{LG_CSS}{`:root { ${dark ? THEME_VARS_DARK : THEME_VARS_LIGHT} }`}</style>
<div style={{ display: “flex”, flexDirection: “column”, alignItems: “center”, justifyContent: “center”, minHeight: “80vh”, textAlign: “center”, padding: 20 }}>
<PiggyBank size={64} strokeWidth={1.5} color=“var(–sub3)” style={{ marginBottom: 16 }} />
<p style={{ fontSize: 17, fontWeight: 600, color: “var(–sub)”, margin: “0 0 6px” }}>Welcome to KiddoBank</p>
<p style={{ fontSize: 14, color: “var(–sub2)”, margin: “0 0 24px” }}>Add your first child to get started.</p>
<Btn onClick={() => { setWsName(””); setWsColor(COLORS[0].name); setWsPhoto(null); setWsChores(true); setWsOpen(true); }} color=”#007AFF”><Plus size={18} /> Add Child</Btn>
</div>
<Modal open={wsOpen} onClose={() => setWsOpen(false)} title=“Add Child”>
<div style={{ display: “flex”, justifyContent: “center”, marginBottom: 16 }}>
<div onClick={() => wsFileRef.current?.click()} style={{ position: “relative”, cursor: “pointer” }}>
{wsPhoto ? <img src={wsPhoto} alt=”” style={{ width: 76, height: 76, borderRadius: “50%”, objectFit: “cover”, border: `2.5px solid #007AFF` }} />
: <div style={{ width: 76, height: 76, borderRadius: “50%”, background: “var(–empty-bg)”, border: “2px dashed rgba(120,120,128,0.2)”, display: “flex”, alignItems: “center”, justifyContent: “center” }}><Camera size={26} color="var(--sub)" /></div>}
<div style={{ position: “absolute”, bottom: -3, right: -3, background: “#007AFF”, borderRadius: 10, width: 22, height: 22, display: “flex”, alignItems: “center”, justifyContent: “center” }}><Camera size={11} color="#fff" /></div>
</div>
<input ref={wsFileRef} type=“file” accept=“image/*” style={{ display: “none” }} onChange={wsHandleFile} />
</div>
<Field label="Name" value={wsName} onChange={setWsName} placeholder="Child's name" />
<div style={{ marginBottom: 14 }}>
<label style={{ display: “block”, fontSize: 13, fontWeight: 600, color: “var(–sub)”, marginBottom: 6 }}>Color</label>
<div style={{ display: “flex”, gap: 8, flexWrap: “wrap” }}>
{COLORS.map(cl => (
<button key={cl.name} onClick={() => setWsColor(cl.name)}
style={{ width: 32, height: 32, borderRadius: “50%”, background: `linear-gradient(145deg, ${cl.primary}, ${cl.dark})`, border: wsColor === cl.name ? “2.5px solid #007AFF” : “2.5px solid transparent”, cursor: “pointer”, transition: “border 0.2s” }} />
))}
</div>
</div>
<div style={{ display: “flex”, alignItems: “center”, justifyContent: “space-between”, marginBottom: 18, padding: “10px 0”, borderTop: “0.5px solid var(–inp-border)” }}>
<div>
<div style={{ fontSize: 15, fontWeight: 600, color: “var(–text)” }}>Enable Chores</div>
<div style={{ fontSize: 12, color: “var(–sub)”, marginTop: 1 }}>Let this child earn money from tasks</div>
</div>
<button onClick={() => setWsChores(!wsChores)} style={{
width: 51, height: 31, borderRadius: 16, border: “none”, cursor: “pointer”, padding: 2,
background: wsChores ? “#34C759” : “rgba(120,120,128,0.16)”, display: “flex”, alignItems: “center”,
transition: “background 0.3s”
}}>
<div style={{ width: 27, height: 27, borderRadius: 14, background: “#fff”, boxShadow: “0 1px 4px rgba(0,0,0,0.15)”, transition: “transform 0.25s”, transform: wsChores ? “translateX(20px)” : “translateX(0)” }} />
</button>
</div>
<Btn onClick={() => { if (!wsName.trim()) return; addChild({ id: uid(), name: wsName.trim(), color: wsColor, photo: wsPhoto, buckets: [], transactions: [], recurring: [], choresEnabled: wsChores }); setWsOpen(false); }} disabled={!wsName.trim()} full color=”#007AFF”><Plus size={16} /> Add Child</Btn>
</Modal>
{wsShowCropper && wsRawPhoto && (
<ImageCropper src={wsRawPhoto} onCrop={(cropped) => { setWsPhoto(cropped); setWsShowCropper(false); setWsRawPhoto(null); }} onCancel={() => { setWsShowCropper(false); setWsRawPhoto(null); }} />
)}
</div>
);
}

return <AccountScreen child={sel} allChildren={data.children} onBack={() => {}} onSelectChild={setActive} onAddChild={addChild} onUpdate={u => setData(p => ({ …p, children: p.children.map(c => c.id === u.id ? u : c) }))} onDelete={del} dark={dark} onToggleDark={toggleDark} onExport={exportData} onImport={importData} />;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(React.createElement(KiddoBank));
</script>
